name: Bug Report
description: Report a bug or unexpected behaviour in cli2agent
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill in as much detail as possible so the issue can be reproduced and fixed quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what the bug is...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behaviour.
      placeholder: |
        1. Start the server with `...`
        2. Send request `POST /v1/sessions` with body `...`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages.
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "e.g. v20.11.0"
    validations:
      required: false

  - type: input
    id: docker_version
    attributes:
      label: Docker Version (if applicable)
      description: Output of `docker --version`
      placeholder: "e.g. Docker version 26.1.4, build 5650f9b"
    validations:
      required: false

  - type: input
    id: cli2agent_version
    attributes:
      label: cli2agent Version / Image Tag
      description: Package version from `package.json` or Docker image tag used.
      placeholder: "e.g. 0.1.0 or ghcr.io/yourorg/cli2agent:main"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version where the issue occurs.
      placeholder: "e.g. Ubuntu 22.04 / macOS 14.4 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant server logs or curl output here. Redact sensitive values (API keys, tokens) before pasting.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that may help diagnose the issue.
    validations:
      required: false
