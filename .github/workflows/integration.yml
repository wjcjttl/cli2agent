name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Session Management Integration Tests
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install build tools for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Start server
        env:
          CLI2AGENT_WORKSPACE: /tmp
          CLAUDE_CODE_USE_BEDROCK: ${{ secrets.CLAUDE_CODE_USE_BEDROCK }}
          ANTHROPIC_BEDROCK_BASE_URL: ${{ secrets.ANTHROPIC_BEDROCK_BASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          mkdir -p "$HOME/.claude"
          node dist/server.js > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Verify server process is running
        run: |
          sleep 3
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "ERROR: Server process (PID $SERVER_PID) is not running!"
            echo "=== Server logs ==="
            cat /tmp/server.log || true
            exit 1
          fi
          echo "Server process (PID $SERVER_PID) is alive"
          echo "=== Server logs so far ==="
          cat /tmp/server.log || true

      - name: Wait for server to be healthy
        run: |
          echo "Waiting for server at http://localhost:3000/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Server did not become healthy within 30s"
          echo "=== Server logs ==="
          cat /tmp/server.log || true
          exit 1

      - name: Test 1 - Health endpoint returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || \
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('status') == 'ok', f'Expected status=ok, got: {data}'
          print('PASS: health endpoint returned status=ok')
          "

      - name: Test 1b - Health endpoint reports backend
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          backend = data.get('backend', '')
          assert backend, f'Expected backend field in health response, got: {data}'
          print(f'PASS: Health reports backend={backend}')
          "

      - name: Test 2 - POST /v1/sessions returns 201 with id
        run: |
          RESPONSE=$(curl -sf -o /tmp/session_response.json -w "%{http_code}" \
            -X POST http://localhost:3000/v1/sessions \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP status: $RESPONSE"
          echo "Body: $(cat /tmp/session_response.json)"
          [ "$RESPONSE" = "201" ] || { echo "FAIL: expected 201, got $RESPONSE"; exit 1; }
          SESSION_ID=$(python3 -c "
          import json
          data = json.load(open('/tmp/session_response.json'))
          assert 'id' in data, f'Missing id field in response: {data}'
          print(data['id'])
          ")
          echo "SESSION_ID=$SESSION_ID" >> $GITHUB_ENV
          echo "PASS: POST /v1/sessions returned 201 with id=$SESSION_ID"

      - name: Test 3 - GET /v1/sessions returns sessions list
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/v1/sessions)
          echo "Response: $RESPONSE"
          python3 -c "
          import json
          data = json.load(open('/dev/stdin'))
          assert 'sessions' in data, f'Expected sessions field, got: {list(data.keys())}'
          assert isinstance(data['sessions'], list), f'Expected sessions to be list, got: {type(data[\"sessions\"]).__name__}'
          print(f'PASS: GET /v1/sessions returned {len(data[\"sessions\"])} session(s), total={data.get(\"total\", \"?\")}')
          " <<< "$RESPONSE"

      - name: Test 4 - DELETE /v1/sessions/:id returns 204
        run: |
          echo "Deleting session: $SESSION_ID"
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X DELETE "http://localhost:3000/v1/sessions/$SESSION_ID")
          echo "HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "204" ] || { echo "FAIL: expected 204, got $HTTP_STATUS"; exit 1; }
          echo "PASS: DELETE /v1/sessions/$SESSION_ID returned 204"

      - name: Test 5 - POST /v1/messages (non-streaming, validation)
        run: |
          # Test that the /v1/messages endpoint accepts valid requests
          # We test request validation even without auth (the endpoint exists and validates)

          # Test 1: Missing required fields returns 400
          HTTP_STATUS=$(curl -sf -o /tmp/msg_err.json -w "%{http_code}" \
            -X POST http://localhost:3000/v1/messages \
            -H "Content-Type: application/json" \
            -d '{"messages": []}')
          echo "Missing model: HTTP $HTTP_STATUS"
          [ "$HTTP_STATUS" = "400" ] || { echo "FAIL: expected 400 for missing model, got $HTTP_STATUS"; exit 1; }
          echo "PASS: Missing model returns 400"

          # Test 2: Valid request structure (may fail with auth error, but validates schema)
          HTTP_STATUS=$(curl -s -o /tmp/msg_valid.json -w "%{http_code}" \
            -X POST http://localhost:3000/v1/messages \
            -H "Content-Type: application/json" \
            -d '{"model":"claude-sonnet-4-6","max_tokens":100,"messages":[{"role":"user","content":"Say hi"}]}')
          echo "Valid request: HTTP $HTTP_STATUS"
          BODY=$(cat /tmp/msg_valid.json)
          echo "Body: $BODY"
          # Accept 200 (if auth works) or 500 (CLI error) — but NOT 400 (schema rejection)
          if [ "$HTTP_STATUS" = "400" ]; then
            echo "FAIL: valid request returned 400 (schema rejection)"
            exit 1
          fi
          echo "PASS: Valid messages request accepted (HTTP $HTTP_STATUS)"

      - name: Test 6 - POST /v1/messages streaming (conditional on auth)
        run: |
          HEALTH=$(curl -sf http://localhost:3000/health)
          AUTH_METHOD=$(echo "$HEALTH" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('auth', {}).get('method', 'none'))
          ")

          if [ "$AUTH_METHOD" = "none" ]; then
            echo "SKIP: No auth configured, skipping streaming messages test"
            exit 0
          fi

          # Test streaming response
          STREAM_RESPONSE=$(curl -s --max-time 120 -N \
            -X POST http://localhost:3000/v1/messages \
            -H "Content-Type: application/json" \
            -d '{"model":"claude-sonnet-4-6","max_tokens":100,"messages":[{"role":"user","content":"Say the word hello"}],"stream":true}')
          echo "Stream response (first 500 chars): ${STREAM_RESPONSE:0:500}"

          # Check for message_start event
          if echo "$STREAM_RESPONSE" | grep -q "message_start"; then
            echo "PASS: Streaming response contains message_start event"
          else
            echo "WARN: message_start not found in streaming response"
          fi

      - name: Test 7 - Execute endpoint (conditional on auth)
        run: |
          # Check auth method from health endpoint
          HEALTH=$(curl -sf http://localhost:3000/health)
          AUTH_METHOD=$(echo "$HEALTH" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('auth', {}).get('method', 'none'))
          ")
          echo "Auth method: $AUTH_METHOD"

          if [ "$AUTH_METHOD" = "none" ]; then
            echo "SKIP: No auth method configured"
            exit 0
          fi

          # Create a fresh session for the execute test
          EXEC_SESSION=$(curl -sf -X POST http://localhost:3000/v1/sessions \
            -H "Content-Type: application/json" -d '{}')
          EXEC_SESSION_ID=$(echo "$EXEC_SESSION" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['id'])
          ")
          echo "Created execute test session: $EXEC_SESSION_ID"

          # Send execute request (allow up to 120s)
          EXEC_RESPONSE=$(curl -sf --max-time 120 -X POST http://localhost:3000/v1/execute \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"Say the word hello\", \"session_id\": \"$EXEC_SESSION_ID\", \"stream\": false, \"max_turns\": 1}")
          echo "Execute response: $EXEC_RESPONSE"

          # Assert response has a status field (completed or error are both valid)
          EXEC_STATUS=$(echo "$EXEC_RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          status = data.get('status', '')
          assert status in ('completed', 'error'), f'Expected status completed or error, got: {status}'
          print(status)
          ")
          echo "PASS: Execute endpoint returned status=$EXEC_STATUS"

          # Clean up the session
          curl -sf -o /dev/null -X DELETE "http://localhost:3000/v1/sessions/$EXEC_SESSION_ID" || true
          echo "Cleaned up session $EXEC_SESSION_ID"

      - name: Stop server
        if: always()
        run: |
          echo "=== Server logs ==="
          cat /tmp/server.log || true
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
            echo "Server stopped (PID $SERVER_PID)"
          fi
